[experimental]

[display]
theme = "light"
dataframes = "rich"
cell_output = "above"
code_editor_font_size = 14
default_width = "medium"
default_table_max_columns = 50
default_table_page_size = 10
reference_highlighting = false

[formatting]
line_length = 79

[ai]
rules = ""
mode = "manual"

[ai.models]
displayed_models = []
custom_models = []

[diagnostics]

[package_management]
manager = "pip"

[completion]
activate_on_typing = true
copilot = false

[snippets]
custom_paths = []
include_default_snippets = true

[runtime]
default_sql_output = "auto"
default_auto_download = []
on_cell_change = "autorun"
auto_instantiate = true
reactive_tests = true
output_max_bytes = 8000000
std_stream_max_bytes = 1000000
auto_reload = "autorun"
watcher_on_save = "lazy"

[server]
browser = "default"
follow_symlink = false

[language_servers.pylsp]
enable_flake8 = false
enabled = true
enable_mypy = true
enable_pydocstyle = false
enable_pylint = false
enable_ruff = true
enable_pyflakes = false

[language_servers.ty]

[language_servers.basedpyright]

[keymap]
preset = "vim"
destructive_delete = true

[keymap.overrides]
"global.runAll" = "Cmd-Shift-enter"
"cell.runAndNewAbove" = "Cmd-Ctrl-Shift-r"

[save]
autosave_delay = 1000
autosave = "off"
format_on_save = false
