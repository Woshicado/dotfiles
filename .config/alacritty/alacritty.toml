live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "#4D5566"
blue = "#59C2FF"
cyan = "#95E6CB"
green = "#56DB3A"
magenta = "#FFEE99"
red = "#FF3333"
white = "#B3B1AD"
yellow = "#FF8F40"

[colors.normal]
black = "#0a0e14"
blue = "#73d0ff"
cyan = "#95e6cb"
green = "#BAE67E"
magenta = "#d4bfff"
red = "#ff3333"
white = "#cbccc6"
yellow = "#C19C00"

[colors.primary]
background = "#0A0E14"
foreground = "#B3B1AD"

[cursor.style]
blinking = "Off"
shape = "Underline"

[env]
TERM = "xterm-256color"

[font]
builtin_box_drawing = false
size = 11.0

[font.bold]
style = "Bold"

[font.bold_italic]
style = "Bold Italic"

[font.italic]
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"

[font.offset]
x = 0
y = 0

[scrolling]
history = 10000
multiplier = 4

[window]
decorations = "none"
dynamic_title = true
opacity = 1.0
resize_increments = false

[window.class]
general = "Alacritty"
instance = "Alacritty"
