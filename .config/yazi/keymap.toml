[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane max-preview"
desc = "Maximize or restore preview"

[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block --confirm'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "<Right>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = "<A-Down>"
run  = "seek 1"
desc = "Scroll preview down"

[[mgr.prepend_keymap]]
on   = "<A-Up>"
run  = "seek -1"
desc = "Scroll preview up"

[[mgr.prepend_keymap]]
on = "<C-p>"
run = 'shell -- qlmanage -p "$@"'
desc = "Quicklook file"

[[mgr.prepend_keymap]]
on   = [ "g", "f" ]
run  = 'search fd --args="-H"'
desc = "Search via fd"

[[mgr.prepend_keymap]]
on   = [ "g", "u" ]
run  = 'cd $HOME/Documents/Uni'
desc = "go to Uni directory"

[[mgr.prepend_keymap]]
on   = [ "g", "v" ]
run  = 'cd $VIRTUAL_ENV'
desc = "go to py venv"

[[mgr.prepend_keymap]]
on = [ "g", "r" ]
run = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "go to git root"

[[mgr.prepend_keymap]]
on   = [ "f","f" ]
run  = "filter --smart"
desc = "find file by filename"

[[mgr.prepend_keymap]]
on   = [ "f","g" ]
run  = "plugin fg"
desc = "find file by content (fuzzy match)"

[[mgr.prepend_keymap]]
on   = [ "f","z" ]
run  = "plugin fg --args='fzf'"
desc = "find file by filename"

[[mgr.prepend_keymap]]
on  = "<A-m>"
run = '''shell --
	paths=$(for p in "$@"; do echo "$p"; done | paste -s -d,)
	thunderbird -compose "attachment='$paths'"
'''

# Bookmarks

[[mgr.prepend_keymap]]
on = [ "b", "a" ]
run = "plugin yamb --args=save"
desc = "Add bookmark"

[[mgr.prepend_keymap]]
on = [ "b", "d" ]
run = "plugin yamb --args=delete_by_fzf"
desc = "Delete bookmark by fzf"

[[mgr.prepend_keymap]]
on = [ "b", "r" ]
run = "plugin yamb --args=rename_by_fzf"
desc = "Rename bookmark by key"

[[mgr.prepend_keymap]]
on = [ "b", "g" ]
run = "plugin yamb --args=jump_by_fzf"
desc = "Jump bookmark by fzf"

[[mgr.prepend_keymap]]
on = [ "g", "b" ]
run = "plugin yamb --args=jump_by_fzf"
desc = "Jump bookmark by fzf"

[[mgr.prepend_keymap]]
on   = "<C-d>"
run  = "plugin diff"
desc = "Diff the selected with the hovered file"

[[mgr.prepend_keymap]]
on = [ "g", "l" ]
run = "follow"
desc = "Follow hovered symlink"
