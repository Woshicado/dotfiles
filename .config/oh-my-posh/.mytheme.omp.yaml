# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

enable_cursor_positioning: true
final_space: true
shell_integration: true
console_title_template: "{{.Shell}} on {{.UserName}}@{{.HostName}}"
version: 2

blocks:
- type: prompt
  newline: true
  alignment: left
  segments:
  - type: session
    style: plain
    foreground: lightYellow
    template: "{{ if .SSHSession }}\U000f08b9 {{ .HostName }} {{ end }}"
  - type: os
    style: powerline
    template: "{{ if .WSL }}WSL at {{ end }}{{.Icon}}"
    background: ""
    foreground: green
  - type: path
    style: plain
    template: " {{ path .Path .Location }} "
    properties:
      style: agnoster_short
      home_icon: "\U000f0725"
      folder_separator_icon: "\U000f0fdf"
      max_depth: 3
      folder_icon: "\U000f01d8"
    background: ""
    foreground: green
  - type: git
    style: plain
    template: "{{ if not .Detached }}{{ .HEAD }}{{ else }}\U000F0065 {{ substr 0 7 .Commit.Sha }}{{.Upstream}}{{ end }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Staging.Changed }} \uf046 {{ .Staging.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Working.Changed }} {{ .Working.String }}{{ end }} "
    properties:
      fetch_status: true
      commit_icon: "\U000F0065 "
      branch_max_length: 12
      branch_ahead_icon: "⇡"
      branch_behind_icon: "⇣"
    background: ""
    foreground: "#888888"

- type: prompt
  alignment: right
  segments:
  - type: root
    style: plain
    template: "| root "
    background: ""
    foreground: red
  - type: dart
    style: powerline
    template: "| \ue798 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
    background: ""
    foreground: "#06A4CE"
  - type: node
    style: powerline
    template: "| \ue718 {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} "
    background: ""
    foreground: "#6CA35E"
  - type: python
    style: plain
    template: "{{if .Venv }}| \ued1b {{ .Venv }} {{ end }}"
    properties:
      display_mode: context
      fetch_virtual_env: true
      display_default: false
      home_enabled: true
    background: ""
    foreground: magenta
  - type: battery
    style: powerline
    invert_powerline: true
    foreground_templates:
    - "{{if eq \"Charging\" .State.String}}#4caf50{{end}}"
    - "{{if eq \"Discharging\" .State.String}}#40c4ff{{end}}"
    - "{{if eq \"Full\" .State.String}}#ff0000{{end}}"
    template: "| {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }} \U000f03f0 "
    properties:
      charged_icon: "\U000f17e8 "
      charging_icon: "\ue234 "
    background: ""
    foreground: ""
  - type: executiontime
    style: plain
    foreground: yellow
    background: transparent
    template: '| {{ .FormattedMs }} '
    properties:
      always_enabled: false
      threshold: 3000
      style: round
  - type: owm
    style: plain
    template: "| {{.Weather}} ({{.Temperature}}{{.UnitIcon}}) "
    foreground: cyan
    background: ""
    properties:
      api_key: ""
      location: "Saarbrücken,66111,DE"
      http_timeout: 200
      cache_timeout: 10
      units: metric
  - type: time
    style: plain
    template: "| {{ .CurrentDate | date .Format }}"
    background: ""
    foreground: lightGreen
    min_width: 80

- type: prompt
  alignment: left
  segments:
  - type: status
    style: powerline
    background: ""
    foreground_templates:
    - "{{if gt .Code 0}}red{{end}}"
    - "{{if eq .Code 0}}blue{{end}}"
    template: " \uf105"
    properties:
      always_enabled: true
  newline: true

- type: rprompt
  segments:
    - type: status
      style: plain
      foreground: red
      template: "{{if gt .Code 0 }}\uea87 {{ .Code }}{{end}}"

secondary_prompt:
  background: "transparent"
  foreground: "#555555"
  template: " \uf101\uf105 "


transient_prompt:
  background: "transparent"
  foreground_templates:
  - "{{if gt .Code 0}}red{{end}}"
  - "{{if eq .Code 0}}blue{{end}}"
  template: "\uf104{{ now | date \"15:04\" }}{{ if .Segments.Executiontime.FormattedMs }} | <yellow>\U000f0dbc{{ .Segments.Executiontime.FormattedMs }}</>{{ end }}{{if gt .Code 0}} | \uea87 {{ .Code }}{{end}}\uf105 "

